# Configurare Nginx pentru publicarea aplicației pe rețeaua internă AEP,
# sub adresa intranet.roaep.ro (accesibilă doar din interiorul rețelei AEP).
#
# Pași:
# 1. La administratorul DNS intern (sau in fisierul de zona interna), adaugă:
#      intranet.roaep.ro   A   <IP-ul serverului din reteaua interna>
#    (sau CNAME, dacă ai deja o intrare similară pentru alte servicii interne)
#
# 2. Copiază acest fișier pe server, în /etc/nginx/sites-available/intranet.roaep.ro
#    și fă symlink în /etc/nginx/sites-enabled/:
#      sudo ln -s /etc/nginx/sites-available/intranet.roaep.ro /etc/nginx/sites-enabled/
#
# 3. Certificat SSL — pentru un domeniu intern, Let's Encrypt (certbot) NU funcționează,
#    pentru că necesită validare din internetul public. Ai două opțiuni:
#    a) Cere un certificat de la CA-ul intern AEP (dacă există o infrastructură PKI internă)
#       și pune fișierele .crt / .key pe server, apoi decomentează blocul HTTPS de mai jos.
#    b) Rulează doar pe HTTP (fără blocul HTTPS), dacă politica de securitate internă o permite
#       pentru servicii accesibile exclusiv din intranet.
#
# 4. sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name intranet.roaep.ro;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

